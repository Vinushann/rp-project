<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ATHENA Context-Aware Forecasting icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="trend" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)" stroke="#1f2937"/>

  <!-- Context ring -->
  <circle cx="32" cy="32" r="21" fill="none" stroke="#334155" stroke-width="2"/>

  <!-- Forecast trend line -->
  <path d="M14 40 L24 33 L31 36 L41 24 L50 19" fill="none" stroke="url(#trend)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="14" cy="40" r="2.8" fill="#22c55e"/>
  <circle cx="24" cy="33" r="2.8" fill="#22c55e"/>
  <circle cx="31" cy="36" r="2.8" fill="#f59e0b"/>
  <circle cx="41" cy="24" r="2.8" fill="#38bdf8"/>
  <circle cx="50" cy="19" r="2.8" fill="#38bdf8"/>

  <!-- Context nodes -->
  <circle cx="16" cy="16" r="3" fill="#f59e0b"/>
  <circle cx="48" cy="47" r="3" fill="#a78bfa"/>
  <path d="M18.7 18.2 L23 22" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M45.3 44.7 L41.5 41" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
</svg>
